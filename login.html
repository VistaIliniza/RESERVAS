<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Vista Iliniza Lodge</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           DISEÑO PREMIUM DEL LOGIN (EFECTO VIDRIO)
           ========================================= */
        :root {
            --brand-dark: #27462A;   
            --brand-light: #396132;  
            --brand-accent: #edb00a; 
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            /* Aquí está la magia: un degradado semitransparente verde/oscuro sobre tu banner */
            background: linear-gradient(rgba(15, 23, 42, 0.5), rgba(39, 70, 42, 0.85));
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            /* Blanco con 95% de opacidad para dejar ver sutilmente el fondo */
            background: rgba(255, 255, 255, 0.95);
            /* Efecto de desenfoque estilo Apple/iOS */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }

        .login-logo {
            max-width: 200px;
            height: auto;
            margin-bottom: 25px;
            /* Un pequeño filtro para que resalte más sobre la tarjeta */
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.05));
        }

        .login-header h2 {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid var(--border);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            transition: all 0.3s;
        }

        .form-group input:focus {
            border-color: var(--brand-dark);
            box-shadow: 0 0 0 4px rgba(39, 70, 42, 0.08);
            background: #ffffff;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--brand-dark), var(--brand-light));
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            box-shadow: 0 8px 15px -6px rgba(39, 70, 42, 0.3);
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background: linear-gradient(135deg, var(--brand-accent), #c28f00);
            box-shadow: 0 12px 20px -6px rgba(237, 176, 10, 0.3);
            transform: translateY(-2px);
        }

        .error-message {
            color: #ef4444;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 15px;
            display: none;
            background: #fef2f2;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="img/logo.png" alt="Vista Iliniza Logo" class="login-logo">
        
        <div class="login-header">
            <h2>Panel de Control</h2>
            <p>Ingresa tus credenciales de administrador</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label>Usuario</label>
                <input type="text" id="username" placeholder="Tu usuario" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn-login">Ingresar Sistema</button>
            
            <div class="error-message" id="error-alert">❌ Usuario o contraseña incorrectos.</div>
        </form>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
